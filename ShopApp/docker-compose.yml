version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: shopapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"    
volumes:
  postgres_data:
    